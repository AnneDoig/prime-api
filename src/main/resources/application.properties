spring.application.name=prime-api

# Server port (can be overridden via PORT environment variable)
server.port=${PORT:8080}

spring.mvc.contentnegotiation.default-content-type=application/json

# prime.cache.max-weight: approximate total weight across all algorithm caches
# (uses list size as weight; limit prevents unbounded memory growth)
prime.cache.max-weight=2000000

# prime.cache.ttl: how long cache entries survive idle (time to live after last access)
prime.cache.ttl=15m

# Maximum upTo value for a full prime list response.
# WARNING: Large values cause expensive serialization. At upTo=3M, serialized JSON is 1-2 MB.
# First request at this scale takes 5+ seconds due to segmented-sieve computation.
# Reduce if experiencing memory/serialization issues in production.
prime.max-full-result-up-to=3000000

